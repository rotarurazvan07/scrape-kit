# ════════════════════════════════════════════════════════════════════════════
# CI Configuration
# ════════════════════════════════════════════════════════════════════════════
# Edit the [ci] section to adapt for your repo.
# Edit the [tool.*] sections to configure ruff, mypy, isort, etc.
# ════════════════════════════════════════════════════════════════════════════

[ci]
python-version = "3.10"
src-dirs = "scrape_kit"
test-dirs = "tests"
coverage-fail-under = 80

# ── Tool Configurations ─────────────────────────────────────────────────────

[tool.ruff]
line-length = 127
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "B", "C", "SIM", "PERF"]
ignore = ["UP"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[tool.isort]
profile = "black"
line_length = 127
