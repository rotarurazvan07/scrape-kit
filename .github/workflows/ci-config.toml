# ════════════════════════════════════════════════════════════════════════════
# CI Configuration
# ════════════════════════════════════════════════════════════════════════════
# Edit the [ci] section below to adapt this workflow for your repo.
# Only 4 values need to be changed:
#   python-version   — Python version for non-matrix jobs
#   src-dirs         — Source code dirs (space-separated)
#   test-dirs        — Test dirs (space-separated)
#   coverage-fail-under — Min coverage % to pass
#
# The [mypy], [ruff], [isort] sections are used directly by those tools.
# ════════════════════════════════════════════════════════════════════════════

[ci]
python-version = "3.10"
src-dirs = "scrape_kit"
test-dirs = "tests"
coverage-fail-under = 80

# ── Tool configs (used directly by the tools) ───────────────────────────────

[ruff]
line-length = 127
target-version = "py310"

[ruff.lint]
select = ["E", "F", "B", "C", "SIM", "PERF"]
ignore = ["UP"]

[ruff.format]
quote-style = "double"

[mypy]
python_version = "3.10"
strict = true
ignore_missing_imports = true

[isort]
profile = "black"
line_length = 127

[coverage]
source = ["scrape_kit"]
omit = ["tests/*"]

[pytest]
testpaths = ["tests"]
