name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"

# ════════════════════════════════════════════════════════════════════════════
# PHILOSOPHY
#   auto-fix  — runs first, commits ALL mechanical improvements back to the
#               branch so you never do them manually:
#                 · removes unused imports/vars      (autoflake)
#                 · modernises syntax                (pyupgrade)
#                 · adds trivial type annotations    (autotyping)
#                 · sorts imports                    (isort)
#                 · formats code                     (ruff format)
#                 · fixes lint + perf anti-patterns  (ruff --fix)
#   test      — the ONLY job you need to read. Fails on logic bugs only.
#   audit     — security / complexity scans. Informational, never blocks.
#   ci-gate   — the single required status check for branch protection.
# ════════════════════════════════════════════════════════════════════════════

jobs:

  # ── 1. AUTO-FIX ───────────────────────────────────────────────────────────
  auto-fix:
    name: "Auto-fix"
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # PAT named AUTO_FIX_TOKEN triggers a follow-up run after the commit.
          # Falls back to GITHUB_TOKEN (commit still happens, no follow-up run).
          token: ${{ secrets.AUTO_FIX_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install auto-fix tools
        run: |
          pip install \
            ruff \
            isort \
            pyupgrade \
            autoflake \
            autotyping

      # ── Step 1: Remove dead code ──────────────────────────────────────────
      - name: autoflake — remove unused imports and variables
        run: |
          autoflake \
            --in-place \
            --recursive \
            --remove-all-unused-imports \
            --remove-unused-variables \
            --exclude .venv,__pycache__ \
            scrape_kit/ tests/

      # ── Step 2: Modernise syntax ──────────────────────────────────────────
      - name: pyupgrade — modernise syntax to Python 3.10+
        # Exit 1 = files were rewritten (expected). xargs surfaces as 123.
        # Both are normal — swallow with || true.
        run: |
          find scrape_kit tests -name "*.py" | xargs pyupgrade --py310-plus || true

      # ── Step 3: Add trivial type annotations ──────────────────────────────
      - name: autotyping — infer and add trivial return type annotations
        # Adds -> None, -> bool, -> str, -> int only when 100% certain.
        # Never touches complex return types or parameter annotations.
        run: |
          python -m autotyping \
            --none-return \
            --scalar-return \
            --bool-param \
            scrape_kit/

      # ── Step 4: Sort imports ──────────────────────────────────────────────
      - name: isort — sort imports
        # Runs after autotyping in case it added new imports.
        run: isort scrape_kit/ tests/

      # ── Step 5: Format ────────────────────────────────────────────────────
      - name: ruff format
        # quote-style = "double" in pyproject.toml prevents ruff from
        # rewriting f-string escapes into Python 3.12-only syntax (PEP 701).
        run: ruff format scrape_kit/ tests/

      # ── Step 6: Lint + performance fixes ─────────────────────────────────
      - name: ruff lint --fix
        # Includes PERF rules (perflint) — catches performance anti-patterns
        # such as unnecessary list() calls in loops, .keys() iteration, etc.
        # UP rules excluded — see pyproject.toml comment.
        run: ruff check --fix --unsafe-fixes --output-format=github scrape_kit/ tests/ || true

      # ── Commit everything that changed ────────────────────────────────────
      - name: Commit fixes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Nothing to fix — working tree is clean."
          else
            git add -A
            git commit -m "chore: auto-fix (types · lint · perf) [skip ci]"
            git push
            echo "Fixes committed and pushed."
          fi

  # ── 2. TESTS ─────────────────────────────────────────────────────────────
  # This is the ONLY job you need to read.
  # A failure here = real logic bug or broken behaviour.
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: [auto-fix]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          # Always test the latest commit — may include auto-fix changes.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test deps
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-xdist pytest-timeout

      - name: scrapling install (browser binaries)
        # scrapling[fetchers] provides the CLI. This downloads the actual
        # browser binaries. Must run after pip install -e .
        run: scrapling install

      - name: Run tests
        run: |
          pytest \
            --cov=scrape_kit \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=80 \
            --junitxml=test-results.xml \
            --timeout=60 \
            -n auto \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 14

  # ── 3. AUDIT ─────────────────────────────────────────────────────────────
  # Informational only — never blocks merging.
  audit:
    name: "Audit (security · complexity · dead code)"
    runs-on: ubuntu-latest
    needs: [auto-fix]
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install audit tools
        run: |
          pip install -e .
          pip install bandit pip-audit radon vulture

      - name: bandit — security SAST
        run: |
          bandit -r scrape_kit/ -ll -ii \
            --format json \
            --output bandit-report.json || true
          bandit -r scrape_kit/ -ll -ii || true

      - name: pip-audit — CVE scan
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit || true

      - name: radon — complexity report
        run: |
          echo "── Cyclomatic Complexity ────────────────────────────────────"
          radon cc scrape_kit/ --show-complexity --average --json \
            > radon-cc-report.json || true
          radon cc scrape_kit/ --min C --show-complexity --average || true
          echo ""
          echo "── Maintainability Index ────────────────────────────────────"
          radon mi scrape_kit/ --json > radon-mi-report.json || true
          radon mi scrape_kit/ --show --min B || true

      - name: vulture — dead code detection
        run: vulture scrape_kit/ --min-confidence 80 | tee vulture-report.txt || true

      - name: Upload all audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          retention-days: 30
          path: |
            bandit-report.json
            pip-audit-report.json
            radon-cc-report.json
            radon-mi-report.json
            vulture-report.txt

  # ── GATE ─────────────────────────────────────────────────────────────────
  # Set THIS as the required status check in branch protection settings.
  ci-gate:
    name: "CI Gate"
    if: always()
    needs: [auto-fix, test, audit]
    runs-on: ubuntu-latest
    steps:
      - name: Check required jobs passed
        run: |
          python3 -c "
          import sys
          required = {
              'auto-fix': '${{ needs.auto-fix.result }}',
              'test':     '${{ needs.test.result }}',
          }
          failures = [
              name for name, result in required.items()
              if result not in ('success', 'skipped')
          ]
          if failures:
              print('Blocking failures in:', ', '.join(failures))
              sys.exit(1)
          print('All required jobs passed.')
          print('Audit result (advisory):', '${{ needs.audit.result }}')
          "