name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ════════════════════════════════════════════════════════════════════════════
# CONFIGURATION
#   All user-configurable values are in .github/workflows/ci-config.toml
#   Edit the [ci] section there to adapt for your repo.
# ════════════════════════════════════════════════════════════════════════════

# ════════════════════════════════════════════════════════════════════════════
# PHILOSOPHY
#   auto-fix  — runs first, commits ALL mechanical improvements back to the
#               branch so you never do them manually:
#                 · removes unused imports/vars      (autoflake)
#                 · modernises syntax                (pyupgrade)
#                 · adds trivial type annotations    (autotyping)
#                 · sorts imports                    (isort)
#                 · formats code                     (ruff format)
#                 · fixes lint + perf anti-patterns  (ruff --fix)
#   test      — the ONLY job you need to read. Fails on logic bugs only.
#   audit     — security / complexity / type / docs scans. Informational, never blocks.
#   badges    — generates dynamic status badges and commits them to the repo.
#   ci-gate   — the single required status check for branch protection.
#               ALSO produces a consolidated report of ALL findings.
# ════════════════════════════════════════════════════════════════════════════

jobs:

  # ── 0. LOAD CONFIG ────────────────────────────────────────────────────────
  load-config:
    name: "Load Config"
    runs-on: ubuntu-latest
    outputs:
      python-version: ${{ steps.parse.outputs.python_version }}
      src-dirs: ${{ steps.parse.outputs.src_dirs }}
      test-dirs: ${{ steps.parse.outputs.test_dirs }}
      all-dirs: ${{ steps.parse.outputs.all_dirs }}
      coverage-fail-under: ${{ steps.parse.outputs.coverage_fail_under }}
      mypy-config: ${{ steps.parse.outputs.mypy_config }}

    steps:
      - uses: actions/checkout@v4

      - name: Parse ci-config.toml
        id: parse
        run: |
          python3 << 'PYEOF'
          import tomllib, os

          with open(".github/workflows/ci-config.toml", "rb") as f:
              cfg = tomllib.load(f)

          ci = cfg.get("ci", {})
          python_version = ci.get("python-version", "3.10")
          src_dirs = ci.get("src-dirs", "src")
          test_dirs = ci.get("test-dirs", "tests")
          all_dirs = f"{src_dirs} {test_dirs}"
          coverage_fail_under = str(ci.get("coverage-fail-under", 80))

          # mypy config: use ci-config.toml itself
          mypy_config = ".github/workflows/ci-config.toml"

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"python_version={python_version}\n")
              out.write(f"src_dirs={src_dirs}\n")
              out.write(f"test_dirs={test_dirs}\n")
              out.write(f"all_dirs={all_dirs}\n")
              out.write(f"coverage_fail_under={coverage_fail_under}\n")
              out.write(f"mypy_config={mypy_config}\n")
          PYEOF

  # ── 1. AUTO-FIX ───────────────────────────────────────────────────────────
  auto-fix:
    name: "Auto-fix"
    runs-on: ubuntu-latest
    needs: [load-config]
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_FIX_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.load-config.outputs.python-version }}
          cache: pip

      - name: Install auto-fix tools
        run: |
          pip install ruff isort pyupgrade autoflake autotyping

      - name: autoflake — remove unused imports and variables
        run: |
          autoflake --in-place --recursive \
            --remove-all-unused-imports --remove-unused-variables \
            --exclude .venv,__pycache__ \
            ${{ needs.load-config.outputs.all-dirs }}

      - name: pyupgrade — modernise syntax to Python 3.10+
        run: |
          find ${{ needs.load-config.outputs.all-dirs }} -name "*.py" | \
            xargs pyupgrade --py310-plus || true

      - name: autotyping — infer trivial return type annotations
        run: |
          python -m autotyping --none-return --scalar-return --bool-param \
            ${{ needs.load-config.outputs.src-dirs }}

      - name: isort — sort imports
        run: isort ${{ needs.load-config.outputs.all-dirs }}

      - name: ruff format
        run: ruff format ${{ needs.load-config.outputs.all-dirs }}

      - name: ruff lint --fix
        run: |
          ruff check --fix --unsafe-fixes --output-format=concise \
            ${{ needs.load-config.outputs.all-dirs }} 2>&1 | tee ruff-fix-output.txt || true
          ruff check --fix --unsafe-fixes --output-format=github \
            ${{ needs.load-config.outputs.all-dirs }} || true

      - name: Commit fixes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Nothing to fix — working tree is clean."
          else
            git add -A
            git commit -m "chore: auto-fix (types · lint · perf) [skip ci]"
            git push
            echo "Fixes committed and pushed."
          fi

      - name: Upload auto-fix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autofix-report
          retention-days: 14
          path: ruff-fix-output.txt

  # ── 2. TESTS ─────────────────────────────────────────────────────────────
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: [auto-fix, load-config]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test deps
        run: |
          pip install -e .
          pip install pytest pytest-cov pytest-xdist pytest-timeout

      - name: scrapling install (browser binaries)
        run: scrapling install

      - name: Run tests
        run: |
          pytest \
            --cov=${{ needs.load-config.outputs.src-dirs }} \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${{ needs.load-config.outputs.coverage-fail-under }} \
            --junitxml=test-results.xml \
            --timeout=60 \
            -n auto -v ${{ needs.load-config.outputs.test-dirs }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 14

      - name: Upload test summary
        if: always()
        run: |
          SAFE_PY=$(echo "${{ matrix.python-version }}" | tr '.' '_')
          echo "## Python ${{ matrix.python-version }} Test Summary" > test-summary-py${SAFE_PY}.md
          echo "" >> test-summary-py${SAFE_PY}.md
          if [ -f test-results.xml ]; then
            TESTS=$(python3 -c "
            import xml.etree.ElementTree as ET
            tree = ET.parse('test-results.xml')
            root = tree.getroot()
            tests = int(root.get('tests', 0))
            failures = int(root.get('failures', 0))
            errors = int(root.get('errors', 0))
            skipped = int(root.get('skipped', 0))
            passed = tests - failures - errors - skipped
            print(f'Passed: {passed}, Failed: {failures}, Errors: {errors}, Skipped: {skipped}, Total: {tests}')
            " 2>/dev/null || echo "N/A")
            echo "Results: $TESTS" >> test-summary-py${SAFE_PY}.md
          fi
          if [ -f coverage.xml ]; then
            COV=$(python3 -c "
            import xml.etree.ElementTree as ET
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            line_rate = root.get('line-rate', '0')
            pct = round(float(line_rate) * 100, 1)
            print(f'{pct}%')
            " 2>/dev/null || echo "N/A")
            echo "Coverage: $COV" >> test-summary-py${SAFE_PY}.md
          fi

      - name: Upload test summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-py${{ matrix.python-version }}
          path: test-summary-py$(echo "${{ matrix.python-version }}" | tr '.' '_').md
          retention-days: 14

  # ── 3. AUDIT ─────────────────────────────────────────────────────────────
  audit:
    name: "Audit (security · complexity · types · docs)"
    runs-on: ubuntu-latest
    needs: [auto-fix, load-config]
    if: always()

    outputs:
      mypy_errors: ${{ steps.mypy.outputs.mypy_errors }}
      bandit_issues: ${{ steps.bandit.outputs.bandit_issues }}
      semgrep_findings: ${{ steps.semgrep.outputs.semgrep_findings }}
      pip_audit_vulns: ${{ steps.pip_audit.outputs.pip_audit_vulns }}
      radon_complexity: ${{ steps.radon.outputs.radon_complexity }}
      vulture_dead: ${{ steps.vulture.outputs.vulture_dead }}
      interrogate_pct: ${{ steps.interrogate.outputs.interrogate_pct }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ needs.load-config.outputs.python-version }}
          cache: pip

      - name: Install audit tools
        run: |
          pip install -e .
          pip install bandit pip-audit radon vulture mypy interrogate

      - name: Install semgrep (via official action)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/auto
        continue-on-error: true

      - name: mypy — static type checking
        id: mypy
        run: |
          echo "── Type Checking ─────────────────────────────────────────────"
          mypy ${{ needs.load-config.outputs.src-dirs }} \
            --config-file ${{ needs.load-config.outputs.mypy-config }} \
            --no-error-summary 2>&1 | tee mypy-output.txt || true
          MYPY_ERRORS=$(grep -c "error:" mypy-output.txt 2>/dev/null || echo "0")
          MYPY_ERRORS=$(echo "$MYPY_ERRORS" | tr -d '[:space:]')
          echo "mypy_errors=${MYPY_ERRORS:-0}" >> "$GITHUB_OUTPUT"
          echo "Found ${MYPY_ERRORS:-0} type error(s)."

      - name: bandit — security SAST
        id: bandit
        run: |
          bandit -r ${{ needs.load-config.outputs.src-dirs }} -ll -ii \
            --format json --output bandit-report.json || true
          bandit -r ${{ needs.load-config.outputs.src-dirs }} -ll -ii 2>&1 | tee bandit-output.txt || true
          BANDIT_ISSUES=$(grep -c ">> Issue" bandit-output.txt 2>/dev/null || echo "0")
          BANDIT_ISSUES=$(echo "$BANDIT_ISSUES" | tr -d '[:space:]')
          echo "bandit_issues=${BANDIT_ISSUES:-0}" >> "$GITHUB_OUTPUT"
          echo "Found ${BANDIT_ISSUES:-0} security issue(s)."

      - name: semgrep — pattern-based security & bug detection
        id: semgrep
        run: |
          if [ -f "semgrep-report.json" ]; then
            SEMGREP_FINDINGS=$(python3 -c "
            import json
            try:
                with open('semgrep-report.json') as f:
                    data = json.load(f)
                print(len(data.get('results', [])))
            except:
                print('0')
            " 2>/dev/null || echo "0")
          else
            SEMGREP_FINDINGS="0"
          fi
          SEMGREP_FINDINGS=$(echo "$SEMGREP_FINDINGS" | tr -d '[:space:]')
          echo "semgrep_findings=${SEMGREP_FINDINGS:-0}" >> "$GITHUB_OUTPUT"
          echo "Found ${SEMGREP_FINDINGS:-0} semgrep finding(s)."

      - name: pip-audit — dependency CVE scan
        id: pip_audit
        run: |
          pip-audit --format json --output pip-audit-report.json || true
          pip-audit 2>&1 | tee pip-audit-output.txt || true
          PIP_AUDIT_VULNS=$(python3 -c "
          import json
          try:
              with open('pip-audit-report.json') as f:
                  data = json.load(f)
              print(len(data.get('dependencies', [])))
          except:
              print('0')
          " 2>/dev/null || echo "0")
          PIP_AUDIT_VULNS=$(echo "$PIP_AUDIT_VULNS" | tr -d '[:space:]')
          echo "pip_audit_vulns=${PIP_AUDIT_VULNS:-0}" >> "$GITHUB_OUTPUT"
          echo "Found ${PIP_AUDIT_VULNS:-0} vulnerable dependency(ies)."

      - name: radon — complexity report
        id: radon
        run: |
          echo "── Cyclomatic Complexity ────────────────────────────────────"
          radon cc ${{ needs.load-config.outputs.src-dirs }} \
            --show-complexity --average --json > radon-cc-report.json || true
          radon cc ${{ needs.load-config.outputs.src-dirs }} \
            --min C --show-complexity --average 2>&1 | tee radon-cc-output.txt || true
          echo ""
          echo "── Maintainability Index ────────────────────────────────────"
          radon mi ${{ needs.load-config.outputs.src-dirs }} --json > radon-mi-report.json || true
          radon mi ${{ needs.load-config.outputs.src-dirs }} --show --min B || true
          RADON_COMPLEXITY=$(python3 -c "
          import json
          try:
              with open('radon-cc-report.json') as f:
                  data = json.load(f)
              high = sum(1 for file in data.values() for func in file if func.get('rank', '') in ('C', 'D', 'E', 'F'))
              print(high)
          except:
              print('0')
          " 2>/dev/null || echo "0")
          RADON_COMPLEXITY=$(echo "$RADON_COMPLEXITY" | tr -d '[:space:]')
          echo "radon_complexity=${RADON_COMPLEXITY:-0}" >> "$GITHUB_OUTPUT"
          echo "Found ${RADON_COMPLEXITY:-0} high-complexity function(s)."

      - name: vulture — dead code detection
        id: vulture
        run: |
          vulture ${{ needs.load-config.outputs.src-dirs }} \
            --min-confidence 80 | tee vulture-report.txt || true
          VULTURE_DEAD=$(wc -l < vulture-report.txt 2>/dev/null || echo "0")
          VULTURE_DEAD=$(echo "$VULTURE_DEAD" | tr -d '[:space:]')
          echo "vulture_dead=${VULTURE_DEAD:-0}" >> "$GITHUB_OUTPUT"
          echo "Found ${VULTURE_DEAD:-0} potential dead code location(s)."

      - name: interrogate — docstring coverage
        id: interrogate
        run: |
          interrogate ${{ needs.load-config.outputs.src-dirs }} \
            -v --fail-under=0 2>&1 | tee interrogate-output.txt || true
          INTERROGATE_PCT=$(grep -oP '\d+%' interrogate-output.txt | tail -1 | tr -d '%' || echo "0")
          INTERROGATE_PCT=$(echo "$INTERROGATE_PCT" | tr -d '[:space:]')
          echo "interrogate_pct=${INTERROGATE_PCT:-0}" >> "$GITHUB_OUTPUT"
          echo "Docstring coverage: ${INTERROGATE_PCT:-0}%"

      - name: Upload all audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          retention-days: 30
          path: |
            bandit-report.json
            semgrep-report.json
            pip-audit-report.json
            radon-cc-report.json
            radon-mi-report.json
            vulture-report.txt
            mypy-output.txt
            interrogate-output.txt

      - name: Generate audit summary
        if: always()
        run: |
          cat > audit-summary.md << 'HEADER'
          # Audit Summary

          HEADER

          for section in "Type Checking (mypy)|mypy-output.txt" \
                         "Security (bandit)|bandit-output.txt" \
                         "Pattern Security (semgrep)|semgrep-output.txt" \
                         "Dependencies (pip-audit)|pip-audit-output.txt" \
                         "Complexity (radon)|radon-cc-output.txt" \
                         "Dead Code (vulture)|vulture-report.txt" \
                         "Docstring Coverage (interrogate)|interrogate-output.txt"; do
            title="${section%%|*}"
            file="${section##*|}"
            echo "## $title" >> audit-summary.md
            echo '```' >> audit-summary.md
            cat "$file" 2>/dev/null >> audit-summary.md || echo "No output" >> audit-summary.md
            echo '```' >> audit-summary.md
            echo "" >> audit-summary.md
          done

      - name: Upload audit summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-summary
          path: audit-summary.md
          retention-days: 30

  # ── 4. BADGES ─────────────────────────────────────────────────────────────
  badges:
    name: "Generate Badges"
    runs-on: ubuntu-latest
    needs: [test, audit, load-config]
    if: always() && github.event_name == 'push'
    permissions:
      contents: write
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_FIX_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Determine badge statuses
        id: badges
        run: |
          TEST_RESULT="${{ needs.test.result }}"
          if [ "$TEST_RESULT" = "success" ]; then
            TEST_COLOR="brightgreen"; TEST_STATUS="passing"
          elif [ "$TEST_RESULT" = "failure" ]; then
            TEST_COLOR="red"; TEST_STATUS="failing"
          else
            TEST_COLOR="yellow"; TEST_STATUS="skipped"
          fi

          COVERAGE_PCT="${{ needs.load-config.outputs.coverage-fail-under }}+"
          COVERAGE_COLOR="brightgreen"

          MYPY_ERRORS="${{ needs.audit.outputs.mypy_errors }}"
          BANDIT_ISSUES="${{ needs.audit.outputs.bandit_issues }}"
          SEMGREP_FINDINGS="${{ needs.audit.outputs.semgrep_findings }}"
          PIP_AUDIT_VULNS="${{ needs.audit.outputs.pip_audit_vulns }}"
          RADON_COMPLEXITY="${{ needs.audit.outputs.radon_complexity }}"
          VULTURE_DEAD="${{ needs.audit.outputs.vulture_dead }}"
          INTERROGATE_PCT="${{ needs.audit.outputs.interrogate_pct }}"

          # Type checking badge
          if [ "$MYPY_ERRORS" = "0" ] || [ -z "$MYPY_ERRORS" ]; then
            MYPY_COLOR="brightgreen"; MYPY_STATUS="passing"
          else
            MYPY_COLOR="red"; MYPY_STATUS="$MYPY_ERRORS errors"
          fi

          # Security badge
          if [ "$BANDIT_ISSUES" = "0" ] || [ -z "$BANDIT_ISSUES" ]; then
            SECURITY_COLOR="brightgreen"; SECURITY_STATUS="clean"
          else
            SECURITY_COLOR="orange"; SECURITY_STATUS="$BANDIT_ISSUES issues"
          fi

          # Dependencies badge
          if [ "$PIP_AUDIT_VULNS" = "0" ] || [ -z "$PIP_AUDIT_VULNS" ]; then
            DEPS_COLOR="brightgreen"; DEPS_STATUS="up to date"
          else
            DEPS_COLOR="orange"; DEPS_STATUS="$PIP_AUDIT_VULNS vulns"
          fi

          # Code quality badge
          if [ "$RADON_COMPLEXITY" = "0" ] || [ -z "$RADON_COMPLEXITY" ]; then
            QUALITY_COLOR="brightgreen"; QUALITY_STATUS="A-B"
          else
            QUALITY_COLOR="yellow"; QUALITY_STATUS="$RADON_COMPLEXITY C+"
          fi

          # Dead code badge
          if [ "$VULTURE_DEAD" = "0" ] || [ -z "$VULTURE_DEAD" ]; then
            DEADCODE_COLOR="brightgreen"; DEADCODE_STATUS="none"
          else
            DEADCODE_COLOR="yellow"; DEADCODE_STATUS="$VULTURE_DEAD found"
          fi

          # Docstring coverage badge
          if [ -n "$INTERROGATE_PCT" ] && [ "$INTERROGATE_PCT" != "0" ]; then
            if [ "$INTERROGATE_PCT" -ge 80 ] 2>/dev/null; then
              DOCS_COLOR="brightgreen"
            elif [ "$INTERROGATE_PCT" -ge 60 ] 2>/dev/null; then
              DOCS_COLOR="yellow"
            else
              DOCS_COLOR="orange"
            fi
            DOCS_STATUS="${INTERROGATE_PCT}%"
          else
            DOCS_COLOR="lightgrey"; DOCS_STATUS="N/A"
          fi

          {
            echo "test_status=$TEST_STATUS"
            echo "test_color=$TEST_COLOR"
            echo "coverage_pct=$COVERAGE_PCT"
            echo "coverage_color=$COVERAGE_COLOR"
            echo "mypy_status=$MYPY_STATUS"
            echo "mypy_color=$MYPY_COLOR"
            echo "security_status=$SECURITY_STATUS"
            echo "security_color=$SECURITY_COLOR"
            echo "deps_status=$DEPS_STATUS"
            echo "deps_color=$DEPS_COLOR"
            echo "quality_status=$QUALITY_STATUS"
            echo "quality_color=$QUALITY_COLOR"
            echo "deadcode_status=$DEADCODE_STATUS"
            echo "deadcode_color=$DEADCODE_COLOR"
            echo "docs_status=$DOCS_STATUS"
            echo "docs_color=$DOCS_COLOR"
          } >> "$GITHUB_OUTPUT"

      - name: Create badges directory
        run: mkdir -p badges

      - name: Generate badges
        run: |
          for badge in \
            "tests|${{ steps.badges.outputs.test_status }}|${{ steps.badges.outputs.test_color }}" \
            "coverage|${{ steps.badges.outputs.coverage_pct }}|${{ steps.badges.outputs.coverage_color }}" \
            "types|${{ steps.badges.outputs.mypy_status }}|${{ steps.badges.outputs.mypy_color }}" \
            "security|${{ steps.badges.outputs.security_status }}|${{ steps.badges.outputs.security_color }}" \
            "dependencies|${{ steps.badges.outputs.deps_status }}|${{ steps.badges.outputs.deps_color }}" \
            "complexity|${{ steps.badges.outputs.quality_status }}|${{ steps.badges.outputs.quality_color }}" \
            "dead%20code|${{ steps.badges.outputs.deadcode_status }}|${{ steps.badges.outputs.deadcode_color }}" \
            "docs|${{ steps.badges.outputs.docs_status }}|${{ steps.badges.outputs.docs_color }}"; do
            name="${badge%%|*}"
            rest="${badge#*|}"
            status="${rest%%|*}"
            color="${rest##*|}"
            curl -sL "https://img.shields.io/badge/${name}-${status}-${color}" \
              -o "badges/${name//%20/}.svg" || true
          done

      - name: Commit badges
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/*.svg
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
          else
            git commit -m "ci: update status badges [skip ci]"
            git push
            echo "Badges committed and pushed."
          fi

  # ── GATE ─────────────────────────────────────────────────────────────────
  ci-gate:
    name: "CI Gate"
    if: always()
    needs: [auto-fix, test, audit, badges]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download all artifacts
        if: always()
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate consolidated CI report
        if: always()
        run: |
          {
            echo "═══════════════════════════════════════════════════════════"
            echo "  CI CONSOLIDATED REPORT"
            echo "  Run: ${{ github.run_number }}"
            echo "  Commit: ${{ github.sha }}"
            echo "  Branch: ${{ github.ref_name }}"
            echo "═══════════════════════════════════════════════════════════"
            echo ""
            echo "── AUTO-FIX RESULTS ──────────────────────────────────────"
            if [ -f artifacts/autofix-report/ruff-fix-output.txt ]; then
              cat artifacts/autofix-report/ruff-fix-output.txt
            else
              echo "No auto-fix report available."
            fi
            echo ""
            echo "── TEST RESULTS ──────────────────────────────────────────"
            for py in 3.10 3.11 3.12; do
              safe_py=$(echo "$py" | tr '.' '_')
              if [ -f "artifacts/test-summary-py${safe_py}/test-summary-py${safe_py}.md" ]; then
                cat "artifacts/test-summary-py${safe_py}/test-summary-py${safe_py}.md"
              else
                echo "Python $py: No test summary available."
              fi
              echo ""
            done
            echo "── AUDIT RESULTS ─────────────────────────────────────────"
            if [ -f artifacts/audit-summary/audit-summary.md ]; then
              cat artifacts/audit-summary/audit-summary.md
            else
              echo "No audit summary available."
            fi
            echo ""
            echo "── JOB STATUSES ──────────────────────────────────────────"
            echo "auto-fix: ${{ needs.auto-fix.result }}"
            echo "test:     ${{ needs.test.result }}"
            echo "audit:    ${{ needs.audit.result }}"
            echo "badges:   ${{ needs.badges.result }}"
            echo ""
            echo "── KEY METRICS ───────────────────────────────────────────"
            echo "mypy errors:        ${{ needs.audit.outputs.mypy_errors }}"
            echo "bandit issues:      ${{ needs.audit.outputs.bandit_issues }}"
            echo "semgrep findings:   ${{ needs.audit.outputs.semgrep_findings }}"
            echo "pip-audit vulns:    ${{ needs.audit.outputs.pip_audit_vulns }}"
            echo "radon complexity:   ${{ needs.audit.outputs.radon_complexity }}"
            echo "vulture dead code:  ${{ needs.audit.outputs.vulture_dead }}"
            echo "interrogate docs:   ${{ needs.audit.outputs.interrogate_pct }}%"
            echo "═══════════════════════════════════════════════════════════"
          } > consolidated-report.txt
          cat consolidated-report.txt

      - name: Create GitHub annotations
        if: always()
        run: |
          MYPY_ERRORS="${{ needs.audit.outputs.mypy_errors }}"
          if [ "$MYPY_ERRORS" != "0" ] && [ -n "$MYPY_ERRORS" ]; then
            echo "::warning::mypy found $MYPY_ERRORS type error(s)."
          fi
          BANDIT_ISSUES="${{ needs.audit.outputs.bandit_issues }}"
          if [ "$BANDIT_ISSUES" != "0" ] && [ -n "$BANDIT_ISSUES" ]; then
            echo "::warning::bandit found $BANDIT_ISSUES security issue(s)."
          fi
          SEMGREP_FINDINGS="${{ needs.audit.outputs.semgrep_findings }}"
          if [ "$SEMGREP_FINDINGS" != "0" ] && [ -n "$SEMGREP_FINDINGS" ]; then
            echo "::warning::semgrep found $SEMGREP_FINDINGS finding(s)."
          fi
          PIP_AUDIT_VULNS="${{ needs.audit.outputs.pip_audit_vulns }}"
          if [ "$PIP_AUDIT_VULNS" != "0" ] && [ -n "$PIP_AUDIT_VULNS" ]; then
            echo "::warning::pip-audit found $PIP_AUDIT_VULNS vulnerable dependency(ies)."
          fi
          RADON_COMPLEXITY="${{ needs.audit.outputs.radon_complexity }}"
          if [ "$RADON_COMPLEXITY" != "0" ] && [ -n "$RADON_COMPLEXITY" ]; then
            echo "::warning::radon found $RADON_COMPLEXITY high-complexity function(s)."
          fi
          VULTURE_DEAD="${{ needs.audit.outputs.vulture_dead }}"
          if [ "$VULTURE_DEAD" != "0" ] && [ -n "$VULTURE_DEAD" ]; then
            echo "::notice::vulture found $VULTURE_DEAD potential dead code location(s)."
          fi
          INTERROGATE_PCT="${{ needs.audit.outputs.interrogate_pct }}"
          if [ -n "$INTERROGATE_PCT" ] && [ "$INTERROGATE_PCT" != "0" ] && [ "$INTERROGATE_PCT" -lt 80 ] 2>/dev/null; then
            echo "::notice::Docstring coverage is ${INTERROGATE_PCT}%."
          fi

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-ci-report
          path: consolidated-report.txt
          retention-days: 30

      - name: Check required jobs passed
        run: |
          python3 -c "
          import sys
          required = {
              'auto-fix': '${{ needs.auto-fix.result }}',
              'test':     '${{ needs.test.result }}',
          }
          failures = [n for n, r in required.items() if r not in ('success', 'skipped')]
          if failures:
              print('Blocking failures in:', ', '.join(failures))
              sys.exit(1)
          print('All required jobs passed.')
          print('Audit result (advisory):', '${{ needs.audit.result }}')
          "
